name: Build and Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # We'll use a matrix strategy to build all three services in parallel
    strategy:
      matrix:
        service: [api-service, stem-service, midi-service]
        include:
          - service: api-service
            path: services/api_service
          - service: stem-service
            path: services/stem_service
          - service: midi-service
            path: services/midi_service

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.path }}
        push: ${{ github.event_name != 'pull_request' }}
        # We'll tag it with 'latest' and the short git SHA for versioning
        tags: |
          rexby117/${{ matrix.service }}:latest
          rexby117/${{ matrix.service }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
