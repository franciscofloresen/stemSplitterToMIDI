name: Build and Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    
    strategy:
      matrix:
        service: [api-service, stem-service, midi-service]
        include:
          - service: api-service
            path: services/api_service
          - service: stem-service
            path: services/stem_service
          - service: midi-service
            path: services/midi_service

    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.path }}
        platforms: linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          rexby117/${{ matrix.service }}:latest
          rexby117/${{ matrix.service }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Deploy Frontend to S3 and Invalidate CloudFront
      run: |
        WEB_BUCKET=$(aws s3api list-buckets --query "Buckets[?starts_with(Name, 'audio2midi-web-')].Name" --output text | grep -v 'None' | head -n 1)
        if [ -n "$WEB_BUCKET" ]; then
          echo "Syncing web-client to s3://$WEB_BUCKET"
          aws s3 sync web-client/ s3://$WEB_BUCKET
          
          CF_DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Origins.Items[0].DomainName=='$WEB_BUCKET.s3.us-east-1.amazonaws.com'].Id" --output text | grep -v 'None' | head -n 1)
          if [ -n "$CF_DIST_ID" ]; then
            echo "Invalidating CloudFront Distribution: $CF_DIST_ID"
            aws cloudfront create-invalidation --distribution-id $CF_DIST_ID --paths "/*"
          fi
        else
          echo "Web bucket not found. Infrastructure might not be provisioned."
        fi

    - name: Apply Kubernetes Manifests via AWS SSM
      run: |
        INSTANCE_ID=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=audio2midi-node" "Name=instance-state-name,Values=running" --query "Reservations[0].Instances[0].InstanceId" --output text | grep -v 'None' | head -n 1)
        
        if [ -n "$INSTANCE_ID" ]; then
          echo "Found EC2 Node: $INSTANCE_ID"
          # Write the script directly to a file to bypass YAML/Bash EOF delimiter quirks
          echo "export KUBECONFIG=/etc/rancher/k3s/k3s.yaml" > /tmp/deploy_script.sh
          echo "curl -sL \"https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/k8s/config.yaml\" | kubectl apply -f -" >> /tmp/deploy_script.sh
          echo "curl -sL \"https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/k8s/api-deployment.yaml\" | sed \"s|:latest|:${{ github.sha }}|g\" | kubectl apply -f -" >> /tmp/deploy_script.sh
          echo "curl -sL \"https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/k8s/workers-deployment.yaml\" | sed \"s|:latest|:${{ github.sha }}|g\" | kubectl apply -f -" >> /tmp/deploy_script.sh
          
          # Base64 encode the final file
          SCRIPT_B64=$(cat /tmp/deploy_script.sh | base64 -w 0)
          
          COMMAND_ID=$(aws ssm send-command --instance-ids "$INSTANCE_ID" --document-name "AWS-RunShellScript" --parameters "commands=[echo $SCRIPT_B64 | base64 -d | bash]" --query "Command.CommandId" --output text)
          
          echo "Sent SSM Command: $COMMAND_ID. Waiting for it to run..."
          sleep 10
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" || echo "Execution still in progress or check AWS console."
        else
          echo "EC2 node not found. Is it running?"
        fi
